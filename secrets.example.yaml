# ⚠️  TEMPLATE ONLY — DO NOT COMMIT REAL VALUES
#
# Three secrets are required:
#
# 1. auth-terraform-secrets — created automatically by `terraform apply` in homectl-infra.
#    Contains DATABASE_URL. No manual step needed.
#
# 2. auth-secrets — hand-managed. Create once with your own values:
#
#   kubectl create secret generic auth-secrets \
#     --namespace homectl \
#     --from-literal=RS256_PRIVATE_KEY_PEM="$(base64 -w0 < private_key.pem)" \
#     --from-literal=RS256_PUBLIC_KEY_PEM="$(base64 -w0 < public_key.pem)" \
#     --from-literal=GITHUB_ADMIN_CLIENT_ID='...' \
#     --from-literal=GITHUB_ADMIN_CLIENT_SECRET='...' \
#     --from-literal=GITHUB_ADMIN_USER_IDS='...'
#
# 3. auth-client-secrets — hand-managed. Holds the bcrypt hash of each app's
#    client secret, one entry per registered app. Consumed via envFrom, so the
#    key name must match the app's `clientSecretEnv` in apps.json:
#
#   kubectl create secret generic auth-client-secrets \
#     --namespace homectl \
#     --from-literal=WORKBENCH_CLIENT_SECRET='$2b$12$...'
#
# RS256_PRIVATE_KEY_PEM: base64-encoded PEM of the RS256 private key (PKCS#8).
# RS256_PUBLIC_KEY_PEM:  base64-encoded PEM of the RS256 public key (SPKI).
# Both are required — the server signs JWTs with the private key and derives
# the JWKS kid from the public key, which is served at /.well-known/jwks.json.
#
# Generate a new key pair:
#   openssl genrsa -out private_key.pem 2048
#   openssl rsa -in private_key.pem -pubout -out public_key.pem
# Keep private_key.pem in a secure offline store (password manager, encrypted vault).
# Delete it from disk once the secret is created — you only need it again for rotation.
#
# Per-app client secrets: bcrypt hash (cost 12) of the raw secret.
# Generate (run from packages/server so bcryptjs is on the module path):
#   cd packages/server && node -e "const b=require('bcryptjs'); b.hash('raw-secret',12).then(console.log)"
#
apiVersion: v1
kind: Secret
metadata:
  name: auth-secrets
  namespace: homectl
type: Opaque
stringData:
  RS256_PRIVATE_KEY_PEM: "REPLACE_ME"
  RS256_PUBLIC_KEY_PEM: "REPLACE_ME"
  GITHUB_ADMIN_CLIENT_ID: "REPLACE_ME"
  GITHUB_ADMIN_CLIENT_SECRET: "REPLACE_ME"
  GITHUB_ADMIN_USER_IDS: "REPLACE_ME"
---
apiVersion: v1
kind: Secret
metadata:
  name: auth-client-secrets
  namespace: homectl
type: Opaque
stringData:
  WORKBENCH_CLIENT_SECRET: "REPLACE_ME"
