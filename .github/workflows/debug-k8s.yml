name: Debug K8s

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  debug:
    name: Inspect homectl-auth pods
    runs-on: ubuntu-latest

    steps:
      - name: Setup Scaleway CLI and get kubeconfig
        uses: scaleway/action-scw@v0
        with:
          access-key: ${{ secrets.SCW_ACCESS_KEY }}
          secret-key: ${{ secrets.SCW_SECRET_KEY }}
          default-organization-id: ${{ secrets.SCW_ORGANIZATION_ID }}
          default-project-id: ${{ secrets.SCW_PROJECT_ID }}
          args: k8s kubeconfig install ${{ secrets.K8S_CLUSTER_ID }} region=fr-par

      - name: Pod status
        run: |
          kubectl get pods --namespace homectl -l app=homectl-auth -o wide
          kubectl get deployment homectl-auth --namespace homectl -o wide

      - name: Describe pods
        run: |
          kubectl describe pods --namespace homectl -l app=homectl-auth

      - name: Recent events
        run: |
          kubectl get events --namespace homectl --sort-by=.lastTimestamp | tail -50

      - name: Pod logs (current)
        run: |
          kubectl logs --namespace homectl -l app=homectl-auth --all-pods --tail=100 --prefix || true

      - name: Pod logs (previous crash)
        run: |
          for pod in $(kubectl get pods --namespace homectl -l app=homectl-auth -o name); do
            echo "=== previous logs for $pod ==="
            kubectl logs --namespace homectl "$pod" --previous --tail=100 || true
          done
