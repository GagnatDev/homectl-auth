name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Typecheck
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Test (client — no DB needed)
        run: pnpm --filter @gagnatdev/homectl-auth-client test

      - name: Test (proxy — no DB needed)
        run: pnpm --filter @homectl/proxy test

      - name: Test (server — uses @testcontainers/postgresql)
        run: pnpm --filter @homectl/server test
        env:
          # Testcontainers will spin up its own container; the service above
          # is not used by the server tests (kept for potential future use).
          DOCKER_HOST: unix:///var/run/docker.sock
