name: Deploy

on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]

permissions: {}

jobs:
  build:
    name: Build → Push
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read  # checkout
      actions: write  # GHA cache (cache-to: type=gha)
    outputs:
      image_tag: ${{ steps.tag.outputs.IMAGE_TAG }}

    steps:
      - uses: actions/checkout@v6

      - name: Set image tag
        id: tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Log in to Scaleway Container Registry
        uses: docker/login-action@v4
        with:
          registry: rg.fr-par.scw.cloud
          username: nologin
          password: ${{ secrets.SCW_SECRET_KEY }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            rg.fr-par.scw.cloud/homectl/homectl-auth:${{ steps.tag.outputs.IMAGE_TAG }}
            rg.fr-par.scw.cloud/homectl/homectl-auth:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read  # checkout

    steps:
      - uses: actions/checkout@v6

      - name: Setup Scaleway CLI and get kubeconfig
        uses: scaleway/action-scw@v0
        with:
          access-key: ${{ secrets.SCW_ACCESS_KEY }}
          secret-key: ${{ secrets.SCW_SECRET_KEY }}
          default-organization-id: ${{ secrets.SCW_ORGANIZATION_ID }}
          default-project-id: ${{ secrets.SCW_PROJECT_ID }}
          args: k8s kubeconfig install ${{ secrets.K8S_CLUSTER_ID }} region=fr-par

      - name: Deploy to cluster
        run: |
          sed -i "s|\$IMAGE_TAG|${{ needs.build.outputs.image_tag }}|g" k8s/deployment.yaml
          kubectl apply -f k8s/
          kubectl rollout status deployment/homectl-auth \
            --namespace homectl \
            --timeout=120s

      - name: Verify deployment
        run: |
          kubectl get pods --namespace homectl -l app=homectl-auth
