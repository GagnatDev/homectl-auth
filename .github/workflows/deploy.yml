name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'

jobs:
  build-and-deploy:
    name: Build → Push → Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Log in to Scaleway Container Registry
        uses: docker/login-action@v3
        with:
          registry: rg.nl-ams.scw.cloud
          username: nologin
          password: ${{ secrets.SCW_SECRET_KEY }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            rg.nl-ams.scw.cloud/homectl/homectl-auth:${{ steps.tag.outputs.IMAGE_TAG }}
            rg.nl-ams.scw.cloud/homectl/homectl-auth:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy to cluster
        run: |
          # Update the deployment image to the new tag
          kubectl set image deployment/homectl-auth \
            homectl-auth=rg.nl-ams.scw.cloud/homectl/homectl-auth:${{ steps.tag.outputs.IMAGE_TAG }} \
            --namespace homectl

          # Wait for rollout to complete
          kubectl rollout status deployment/homectl-auth \
            --namespace homectl \
            --timeout=120s

      - name: Verify deployment
        run: |
          kubectl get pods --namespace homectl -l app=homectl-auth
