name: Deploy

on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]
  workflow_dispatch:

permissions:
  actions: read
  contents: read

concurrency:
  group: deploy-k8s
  cancel-in-progress: true

env:
  IMAGE_TAG: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

jobs:
  build:
    name: Build → Push
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.IMAGE_TAG }}

      - name: Build and push image
        run: |
          echo "${{ secrets.SCW_SECRET_KEY }}" | docker login rg.fr-par.scw.cloud \
            -u nologin --password-stdin
          docker build -t rg.fr-par.scw.cloud/homectl/homectl-auth:${{ env.IMAGE_TAG }} \
                       -t rg.fr-par.scw.cloud/homectl/homectl-auth:latest .
          docker push rg.fr-par.scw.cloud/homectl/homectl-auth:${{ env.IMAGE_TAG }}
          docker push rg.fr-par.scw.cloud/homectl/homectl-auth:latest

  deploy:
    name: Deploy
    needs: build
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.IMAGE_TAG }}

      - name: Setup Scaleway CLI and get kubeconfig
        uses: scaleway/action-scw@v0
        with:
          access-key: ${{ secrets.SCW_ACCESS_KEY }}
          secret-key: ${{ secrets.SCW_SECRET_KEY }}
          default-organization-id: ${{ secrets.SCW_ORGANIZATION_ID }}
          default-project-id: ${{ secrets.SCW_PROJECT_ID }}
          args: k8s kubeconfig install ${{ secrets.K8S_CLUSTER_ID }} region=fr-par

      - name: Deploy to cluster
        run: |
          sed -i "s|\$IMAGE_TAG|${{ env.IMAGE_TAG }}|g" k8s/deployment.yaml
          kubectl apply -f k8s/
          kubectl rollout status deployment/homectl-auth \
            --namespace homectl \
            --timeout=120s

      - name: Verify deployment
        run: |
          kubectl get pods --namespace homectl -l app=homectl-auth
