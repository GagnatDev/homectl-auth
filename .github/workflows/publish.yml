name: Publish

on:
  workflow_dispatch:
    inputs:
      create_tag:
        description: 'Create git tag after successful publish'
        type: boolean
        default: true

jobs:
  publish:
    name: Publish @gagnatdev/homectl-auth-client
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://npm.pkg.github.com

      - name: Read version from package.json
        id: version
        run: |
          echo "value=$(node -p "require('./packages/client/package.json').version")" >> $GITHUB_OUTPUT

      - name: Check if version is already published
        id: check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://npm.pkg.github.com/@gagnatdev%2Fhomectl-auth-client/${{ steps.version.outputs.value }}")
          if [ "$STATUS" = "200" ]; then
            echo "published=true" >> $GITHUB_OUTPUT
            echo "Version ${{ steps.version.outputs.value }} is already published — skipping."
          else
            echo "published=false" >> $GITHUB_OUTPUT
            echo "Version ${{ steps.version.outputs.value }} not yet published — proceeding."
          fi

      - name: Install dependencies
        if: steps.check.outputs.published == 'false'
        run: pnpm install --frozen-lockfile

      - name: Build
        if: steps.check.outputs.published == 'false'
        run: pnpm --filter @gagnatdev/homectl-auth-client build

      - name: Publish
        if: steps.check.outputs.published == 'false'
        run: pnpm publish --filter @gagnatdev/homectl-auth-client --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create git tag
        if: steps.check.outputs.published == 'false' && inputs.create_tag
        run: |
          git tag "client-v${{ steps.version.outputs.value }}"
          git push origin "client-v${{ steps.version.outputs.value }}"
