# ⚠️  TEMPLATE ONLY — DO NOT COMMIT REAL VALUES
#
# Create the actual Secret in the cluster:
#
#   kubectl create secret generic homectl-auth-secrets \
#     --namespace homectl \
#     --from-literal=POSTGRES_URL='postgres://user:pass@host:5432/db' \
#     --from-literal=RS256_PRIVATE_KEY_PEM="$(base64 -w0 < private_key.pem)" \
#     --from-literal=TRAVEL_JOURNAL_CLIENT_SECRET='$2b$12$...'
#
# RS256_PRIVATE_KEY_PEM: base64-encoded PEM of the RS256 private key.
# Generate a new key pair:
#   openssl genrsa -out private_key.pem 2048
#   openssl rsa -in private_key.pem -pubout -out public_key.pem
#
# Per-app client secrets: bcrypt hash (cost 12) of the raw secret.
# Generate: node -e "const b=require('bcryptjs'); b.hash('raw-secret',12).then(console.log)"
#
apiVersion: v1
kind: Secret
metadata:
  name: homectl-auth-secrets
  namespace: homectl
type: Opaque
stringData:
  POSTGRES_URL: "REPLACE_ME"
  RS256_PRIVATE_KEY_PEM: "REPLACE_ME"
  TRAVEL_JOURNAL_CLIENT_SECRET: "REPLACE_ME"
